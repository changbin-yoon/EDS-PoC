apiVersion: apps/v1
kind: Deployment
metadata: { name: n8n-redis, namespace: n8n }
spec:
  replicas: 1
  selector: { matchLabels: { app: n8n-redis } }
  template:
    metadata: { labels: { app: n8n-redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes"]
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: n8n-redis, namespace: n8n }
spec:
  selector: { app: n8n-redis }
  ports: [{ port: 6379, targetPort: 6379 }]