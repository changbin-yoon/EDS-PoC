apiVersion: v1
kind: Namespace
metadata:
  name: trino
---
# ── Coordinator 설정 (단일 노드 모드 — Worker 없이 coordinator가 실행도 담당) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-coordinator-config
  namespace: trino
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    http-server.process-forwarded=true
    query.max-memory=1GB
    query.max-memory-per-node=512MB
    discovery.uri=http://trino-coordinator.trino.svc.cluster.local:8080

  node.properties: |
    node.environment=production
    node.id=trino-coordinator
    node.data-dir=/data/trino

  jvm.config: |
    -server
    -XX:InitialRAMPercentage=80
    -XX:MaxRAMPercentage=80
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+ExitOnOutOfMemoryError
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:-OmitStackTraceInFastThrow
    -XX:ReservedCodeCacheSize=512M
    -XX:PerMethodRecompilationCutoff=10000
    -XX:PerBytecodeRecompilationCutoff=10000
    -Djdk.attach.allowAttachSelf=true
    -Djdk.nio.maxCachedBufferSize=2000000
    -XX:+UnlockDiagnosticVMOptions
    --add-opens=java.base/java.nio=ALL-UNNAMED
    --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
    --add-opens=java.base/java.lang=ALL-UNNAMED
    --add-opens=java.base/java.lang.reflect=ALL-UNNAMED

  log.properties: |
    io.trino=INFO
---
# ── 카탈로그 (Ignite / PostgreSQL / Redis) ────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog
  namespace: trino
data:
  ignite.properties: |
    connector.name=ignite
    connection-url=jdbc:ignite:thin://ignite-svc.ignite.svc.cluster.local:10800
    connection-user=eds
    connection-password=edsuser123

  postgresql.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://eds-pg-rw.cnpg.svc.cluster.local:5432/eds
    connection-user=eds
    connection-password=edsuser123

  redis.properties: |
    connector.name=redis
    redis.nodes=redis-svc.redis.svc.cluster.local:6379
    redis.password=edsuser123
    redis.default-schema=default
    redis.table-description-dir=/etc/trino/redis-tables
    redis.hide-internal-columns=false
    redis.key-prefix-schema-table=true

  kafka.properties: |
    connector.name=kafka
    kafka.nodes=my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
    kafka.table-description-dir=/etc/trino/kafka-tables
    kafka.table-names=default.device_events
    kafka.hide-internal-columns=false
---
# ── Kafka 테이블 정의 (pushdown 검증용, device_events 토픽) ──────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-kafka-tables
  namespace: trino
data:
  device_events.json: |
    {
      "tableName": "device_events",
      "schemaName": "default",
      "topicName": "device_events",
      "key": {
        "dataFormat": "raw",
        "fields": [
          { "name": "kafka_key", "type": "VARCHAR", "hidden": true }
        ]
      },
      "message": {
        "dataFormat": "json",
        "fields": [
          { "name": "device_id",  "mapping": "device_id",  "type": "BIGINT" },
          { "name": "event_type", "mapping": "event_type", "type": "VARCHAR" },
          { "name": "value",      "mapping": "value",      "type": "DOUBLE" }
        ]
      }
    }
---
# ── Redis 테이블 정의 (예시: default.users — Hash 타입) ──────────────────────
# 키 형식: users:<id>  (스키마명 없이 테이블명만 prefix — key-prefix-schema-table=true여도
# 실제로는 "<schemaName>:<tableName>:"가 아니라 "<tableName>:"만 붙여야 인식됨.
# 실측: default:users:1로 넣으면 Trino가 0행으로 인식, users:1로 넣어야 조회됨)
# 데이터 삽입 예시:
#   redis-cli -a edsuser123 HSET users:1 id 1 name "Alice" email "alice@example.com"
#   redis-cli -a edsuser123 HSET users:2 id 2 name "Bob"   email "bob@example.com"
# Trino 조회:
#   SELECT * FROM redis.default.users;
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-redis-tables
  namespace: trino
data:
  users.json: |
    {
      "tableName": "users",
      "schemaName": "default",
      "key": {
        "dataFormat": "raw",
        "fields": [
          {
            "name": "redis_key",
            "type": "varchar",
            "hidden": true
          }
        ]
      },
      "value": {
        "dataFormat": "hash",
        "fields": [
          {
            "name": "id",
            "type": "bigint",
            "mapping": "id"
          },
          {
            "name": "name",
            "type": "varchar",
            "mapping": "name"
          },
          {
            "name": "email",
            "type": "varchar",
            "mapping": "email"
          }
        ]
      }
    }

  # ── death — sample/7.DEATH.csv 와 동일 스키마 (Ignite/PostgreSQL과 교차 비교용) ──
  # 키 형식: death:<person_id>  (스키마명 없이 테이블명만 prefix — 위 users 예제 주석 참고)
