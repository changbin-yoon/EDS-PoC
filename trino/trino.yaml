# ── Coordinator Service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: trino-coordinator
  namespace: trino
  labels:
    app: trino
    component: coordinator
spec:
  selector:
    app: trino
    component: coordinator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# ── Coordinator Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-coordinator
  namespace: trino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
      component: coordinator
  template:
    metadata:
      labels:
        app: trino
        component: coordinator
    spec:
      containers:
        - name: trino
          image: trinodb/trino:481
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: config
              mountPath: /etc/trino/log.properties
              subPath: log.properties
            - name: catalog
              mountPath: /etc/trino/catalog/ignite.properties
              subPath: ignite.properties
            - name: catalog
              mountPath: /etc/trino/catalog/postgresql.properties
              subPath: postgresql.properties
            - name: catalog
              mountPath: /etc/trino/catalog/redis.properties
              subPath: redis.properties
            - name: catalog
              mountPath: /etc/trino/catalog/kafka.properties
              subPath: kafka.properties
            - name: redis-tables
              mountPath: /etc/trino/redis-tables
            - name: kafka-tables
              mountPath: /etc/trino/kafka-tables
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: trino-coordinator-config
        - name: catalog
          configMap:
            name: trino-catalog
        - name: redis-tables
          configMap:
            name: trino-redis-tables
        - name: kafka-tables
          configMap:
            name: trino-kafka-tables
---
# ── Trino UI Ingress ───────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trino
  namespace: trino
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: trino.dev-cluster.k8s.miribit.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trino-coordinator
                port:
                  number: 8080
