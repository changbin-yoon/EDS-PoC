apiVersion: v1
kind: Namespace
metadata:
  name: ignite
---
# ============================================================================
# ConfigMap — ignite-config.xml 과 동기화 유지
# 설정 변경 시 ignite-config.xml 과 이 ConfigMap 을 함께 수정할 것
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ignite-config
  namespace: ignite
data:
  ignite-config.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <!--
      Apache Ignite 2.x — 32GB 노드 최적화 프로덕션 인메모리 버퍼 설정
      노드 메모리 : 32GB (OS 3GB + JVM Heap 6GB + Off-Heap 23GB)
      아키텍처   : Kafka ──[IgniteKafkaStreamer]──▶ Ignite(Hot Buffer)
                                                       ◀── Spark (Bulk Scan → Iceberg/S3)
                                                       ◀── Trino (Hot Query + Federation)
    -->
    <beans xmlns="http://www.springframework.org/schema/beans"
           xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
           xsi:schemaLocation="
             http://www.springframework.org/schema/beans
             http://www.springframework.org/schema/beans/spring-beans.xsd">

      <bean class="org.apache.ignite.configuration.IgniteConfiguration">

        <property name="igniteInstanceName" value="eds-ignite-cluster"/>

        <!-- [1] PME 방지 — Failure Detection 타임아웃 -->
        <property name="failureDetectionTimeout"       value="30000"/>
        <property name="clientFailureDetectionTimeout" value="30000"/>
        <property name="systemWorkerBlockedTimeout"    value="30000"/>

        <!-- tryStop/timeout은 2.18.0에서 생성자 인자로만 설정 가능(setter 없음) →
             property 주입 시 NotWritablePropertyException. 기본 생성자 사용 -->
        <property name="failureHandler">
          <bean class="org.apache.ignite.failure.StopNodeOrHaltFailureHandler"/>
        </property>

        <!-- [2] Discovery SPI — TcpDiscoveryVmIpFinder (정적 주소 기반)
             단일 replica 구성이라 K8s API 기반 동적 탐색 불필요.
             헤드리스 서비스(ignite-svc-headless)의 DNS로 정적 주소 지정 -->
        <property name="discoverySpi">
          <bean class="org.apache.ignite.spi.discovery.tcp.TcpDiscoverySpi">
            <property name="localPort"      value="47500"/>
            <property name="networkTimeout" value="30000"/>
            <property name="socketTimeout"  value="10000"/>
            <property name="ackTimeout"     value="10000"/>
            <property name="maxAckTimeout"  value="60000"/>
            <property name="reconnectCount" value="10"/>
            <property name="joinTimeout"    value="60000"/>
            <property name="ipFinder">
              <bean class="org.apache.ignite.spi.discovery.tcp.ipfinder.vm.TcpDiscoveryVmIpFinder">
                <property name="addresses">
                  <list>
                    <value>ignite-svc-headless:47500..47509</value>
                  </list>
                </property>
              </bean>
            </property>
          </bean>
        </property>

        <!-- [3] Communication SPI -->
        <property name="communicationSpi">
          <bean class="org.apache.ignite.spi.communication.tcp.TcpCommunicationSpi">
            <property name="localPort"          value="47100"/>
            <property name="connectTimeout"     value="10000"/>
            <property name="maxConnectTimeout"  value="30000"/>
            <property name="reconnectCount"     value="10"/>
            <property name="socketWriteTimeout" value="30000"/>
            <property name="messageQueueLimit"  value="1024"/>
            <property name="connectionsPerNode" value="4"/>
          </bean>
        </property>

        <!-- [4] Client Connector — Thin Client(KafkaStreamer) + JDBC(Trino) -->
        <property name="clientConnectorConfiguration">
          <bean class="org.apache.ignite.configuration.ClientConnectorConfiguration">
            <property name="port"                        value="10800"/>
            <property name="threadPoolSize"              value="8"/>
            <property name="maxOpenCursorsPerConnection" value="512"/>
            <property name="thinClientEnabled"           value="true"/>
            <property name="jdbcEnabled"                 value="true"/>
            <property name="odbcEnabled"                 value="false"/>
          </bean>
        </property>

        <!-- [5] DataStorage — 32GB 노드, Native Persistence 활성화 (재기동 시 데이터 보존)
             OS 3GB + JVM Heap 6GB + Off-Heap 23GB = 32GB
             persistence 켜짐 → walMode는 NONE 불가(내구성 보장 안 됨), LOG_ONLY로 변경.
             pageEvictionMode도 persistent region에서는 미지원(디스크 기반 page replacement로
             대체됨) → DISABLED로 변경, evictionThreshold/emptyPagesPoolSize 제거 -->
        <property name="dataStorageConfiguration">
          <bean class="org.apache.ignite.configuration.DataStorageConfiguration">
            <!-- pageSize 8KB: Spark/Trino 대량 스캔 시 순차 I/O 효율 향상 -->
            <property name="pageSize" value="8192"/>
            <property name="walMode"  value="LOG_ONLY"/>
            <property name="defaultDataRegionConfiguration">
              <bean class="org.apache.ignite.configuration.DataRegionConfiguration">
                <property name="name"               value="default_region"/>
                <property name="persistenceEnabled" value="true"/>
                <!-- initialSize: 4GB 사전 확보, maxSize: 23GB = 24,696,061,952 bytes -->
                <property name="initialSize" value="#{4L * 1024 * 1024 * 1024}"/>
                <property name="maxSize"     value="24696061952"/>
                <property name="pageEvictionMode" value="DISABLED"/>
                <property name="metricsEnabled"   value="true"/>
              </bean>
            </property>
          </bean>
        </property>

        <!-- [6] Cache — kafka-hot-cache
             ⚠️ SQL 접근 시 하이픈(-) 때문에 큰따옴표 필요:
                SELECT * FROM ignite.PUBLIC."kafka-hot-cache" -->
        <property name="cacheConfiguration">
          <list>
            <bean class="org.apache.ignite.configuration.CacheConfiguration">
              <property name="name"                value="kafka-hot-cache"/>
              <property name="groupName"           value="eds_hot_group"/>
              <property name="cacheMode"           value="PARTITIONED"/>
              <property name="atomicityMode"       value="ATOMIC"/>
              <property name="backups"             value="1"/>
              <property name="partitionLossPolicy" value="READ_WRITE_SAFE"/>
              <property name="readFromBackup"      value="true"/>
              <property name="copyOnRead"          value="false"/>
              <property name="queryParallelism"    value="4"/>
              <property name="affinity">
                <bean class="org.apache.ignite.cache.affinity.rendezvous.RendezvousAffinityFunction">
                  <!-- 1024 파티션: 4노드×256, 8노드×128 균등 분배. Trino 병렬 스캔 최적화 -->
                  <property name="partitions"       value="1024"/>
                  <property name="excludeNeighbors" value="false"/>
                </bean>
              </property>
              <property name="sqlSchema"         value="PUBLIC"/>
              <property name="statisticsEnabled" value="true"/>
            </bean>
          </list>
        </property>

        <!-- [7] SQL 설정 — 5초 초과 쿼리 경고 로그 -->
        <property name="sqlConfiguration">
          <bean class="org.apache.ignite.configuration.SqlConfiguration">
            <property name="longQueryWarningTimeout" value="5000"/>
          </bean>
        </property>

        <property name="metricsUpdateFrequency" value="5000"/>
        <property name="metricsLogFrequency"    value="60000"/>
        <property name="workDirectory"          value="/opt/ignite/work"/>

      </bean>
    </beans>
---
# ============================================================================
# 헤드리스 서비스 — TcpDiscoveryVmIpFinder 의 정적 주소(ignite-svc-headless)가 참조
# StatefulSet 의 serviceName 과 일치 → Pod DNS 안정화
# (ignite-config.xml discoverySpi.ipFinder.addresses 값과 이름이 동일해야 함)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ignite-svc-headless
  namespace: ignite
  labels:
    app: ignite
spec:
  clusterIP: None
  publishNotReadyAddresses: true   # 기동 중 Pod도 즉시 엔드포인트 등록 → 클러스터 조인 빠름
  selector:
    app: ignite
  ports:
    - name: discovery
      port: 47500
      targetPort: 47500
    - name: communication
      port: 47100
      targetPort: 47100
    - name: jdbc
      port: 10800
      targetPort: 10800
---
# Trino / Spark / Kafka Thin Client 용 클러스터 내부 ClusterIP 서비스
apiVersion: v1
kind: Service
metadata:
  name: ignite-svc
  namespace: ignite
  labels:
    app: ignite
spec:
  selector:
    app: ignite
  ports:
    - name: jdbc
      port: 10800
      targetPort: 10800
---
# 클러스터 외부(PC 등)에서 JDBC/Thin Client 직접 접근용 NodePort 서비스
# LoadBalancer 미사용 이유: 이 클러스터에는 cloud-controller-manager(Octavia 연동)가
# 없어 LoadBalancer 타입 Service가 <pending> 상태로 남기 때문.
# 접속 예: jdbc:ignite:thin://<임의의-노드-IP>:30800
apiVersion: v1
kind: Service
metadata:
  name: ignite-external
  namespace: ignite
  labels:
    app: ignite
spec:
  type: NodePort
  selector:
    app: ignite
  ports:
    - name: jdbc
      port: 10800
      targetPort: 10800
      nodePort: 30800
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ignite-cluster
  namespace: ignite
spec:
  replicas: 1
  serviceName: ignite-svc-headless   # 헤드리스 서비스와 일치 → Pod DNS: ignite-cluster-N.ignite-svc-headless.ignite.svc.cluster.local
  selector:
    matchLabels:
      app: ignite
  template:
    metadata:
      labels:
        app: ignite
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ignite-node
          image: apacheignite/ignite:2.18.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG_URI
              value: /opt/ignite/custom-config/ignite-config.xml
            - name: IGNITE_QUIET
              value: "false"
            # ── JVM 힙 설정 ──────────────────────────────────────────────────
            # 32GB 노드 메모리 레이아웃:
            #   OS 마진   : 3GB
            #   JVM Heap  : 6GB  ← -Xms6g -Xmx6g
            #   Off-Heap  : 23GB (ignite-config.xml maxSize와 정합)
            # G1GC: 6GB Heap에서 STW Pause 최소화. DisableExplicitGC: System.gc() 무시
            - name: JVM_OPTS
              value: >-
                -Xms6g
                -Xmx6g
                -XX:+UseG1GC
                -XX:G1HeapRegionSize=32m
                -XX:+DisableExplicitGC
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/opt/ignite/work/heap.hprof
          ports:
            - name: discovery
              containerPort: 47500
            - name: communication
              containerPort: 47100
            - name: jdbc
              containerPort: 10800
          volumeMounts:
            - name: config-vol
              mountPath: /opt/ignite/custom-config/ignite-config.xml
              subPath: ignite-config.xml
            - name: work
              mountPath: /opt/ignite/work
          # ── 리소스 — 32GB 노드 기준 ────────────────────────────────────────
          # JVM Heap(6GB) + Off-Heap(23GB) = 29GB 최소 필요
          # limits.memory 30Gi = 29GB + OS 오버헤드 여유
          # ⚠️ 다른 노드 스펙에서는 ignite-config.xml maxSize와 함께 재산정 필요
          resources:
            requests:
              cpu: "1"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "30Gi"
          readinessProbe:
            tcpSocket:
              port: 10800
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 10800
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config-vol
          configMap:
            name: ignite-config
  volumeClaimTemplates:
    - metadata:
        name: work
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: csi-cinder-sc-retain
        resources:
          requests:
            storage: 30Gi
