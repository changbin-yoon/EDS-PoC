apiVersion: v1
kind: Namespace
metadata:
  name: cnpg
---
# eds 유저 비밀번호 — CloudNativePG bootstrap 시 참조
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-eds-secret
  namespace: cnpg
type: kubernetes.io/basic-auth
stringData:
  username: eds
  password: edsuser123
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: eds-pg
  namespace: cnpg
spec:
  instances: 1
  bootstrap:
    initdb:
      database: eds
      owner: eds
      secret:
        name: cnpg-eds-secret
  storage:
    size: 10Gi
    storageClass: csi-cinder-sc-retain
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
